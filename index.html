<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tính KM Sinh Nhật 38 Năm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-pnj { background-color: #003366; }
        .text-pnj { color: #003366; }
        .btn-gold { background-color: #FBB117; color: #003366; }
        input:focus { transform: scale(1.02); transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-start pt-6 px-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden mb-6">
        <div class="bg-pnj text-white text-center py-5 relative">
            <h1 class="text-xl font-bold uppercase tracking-wide">Máy Tính Khuyến Mãi</h1>
            <p class="text-sm opacity-90 mt-1">Chuỗi Sinh Nhật 38 Năm</p>
            <div id="statusBadge" class="absolute top-2 right-2 bg-yellow-400 text-pnj text-[10px] font-bold px-2 py-1 rounded-full animate-pulse">
                Đang tải luật...
            </div>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">1. TỔNG GIÁ TRỊ HÓA ĐƠN (VNĐ)</label>
                <input type="text" id="totalBill" placeholder="VD: 50,000,000" 
                    class="w-full px-4 py-3 text-2xl font-bold text-pnj border-2 border-gray-300 rounded-xl focus:border-blue-500 focus:ring-0 outline-none transition text-center"
                    onkeyup="formatCurrency(this)">
                <p class="text-xs text-gray-500 mt-1 text-center">Dùng để xét mốc được Giảm Ngay</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">2. KHÁCH HÀNG & NHÓM HÀNG ƯU ĐÃI</label>
                <select id="promoType" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-800 font-medium rounded-xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                    <option value="NONE">Không mua SP ưu đãi giảm thêm</option>
                    <option value="ECZ_ALL">TẤT CẢ KHÁCH - Mua Trang sức ECZ/CZ</option>
                    <option value="KC_NEW">Khách MỚI/KẾT NỐI - Mua Trang sức Kim cương</option>
                    <option value="KC_VIP12">Khách VIP 1,2 - Mua Trang sức Kim cương</option>
                    <option value="KC_VIP3">Khách VIP 3 - Mua Trang sức Kim cương</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">3. GIÁ TRỊ MÓN HÀNG ƯU ĐÃI ĐÓ (VNĐ)</label>
                <input type="text" id="productValue" placeholder="VD: 30,000,000" 
                    class="w-full px-4 py-3 text-lg font-bold border border-gray-300 rounded-xl focus:border-blue-500 outline-none transition text-center"
                    onkeyup="formatCurrency(this)">
                <p class="text-xs text-red-500 mt-1 text-center">*Điều kiện: Món hàng phải từ 10 triệu trở lên</p>
            </div>

            <button id="calcBtn" onclick="calculatePromo()" disabled class="w-full bg-gray-300 text-gray-500 font-bold text-lg py-4 rounded-xl shadow-md transition transform mt-2">
                ĐANG KẾT NỐI DỮ LIỆU...
            </button>
        </div>

        <div id="resultBox" class="hidden bg-blue-50 p-6 border-t-2 border-blue-200">
            <h3 class="text-center font-bold text-pnj mb-4 uppercase tracking-wider">Chi tiết ưu đãi</h3>
            
            <div class="space-y-3 text-sm">
                <div class="flex justify-between items-center">
                    <span class="text-gray-600 font-medium">Giảm ngay (Theo tổng bill):</span>
                    <span id="resGiamNgay" class="font-bold text-red-600 text-lg">0đ</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600 font-medium">Giảm thêm (% Sản phẩm):</span>
                    <span id="resGiamThem" class="font-bold text-red-600 text-lg">0đ</span>
                </div>
                <div class="h-px bg-gray-300 my-3"></div>
                <div class="flex justify-between items-center text-xl">
                    <span class="font-bold text-gray-800">TỔNG SAU GIẢM:</span>
                    <span id="resTongSauGiam" class="font-extrabold text-pnj text-2xl">0đ</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFpA8jFp8OI8Ggo_mNa2Unjicbb7pP0OFa0pUXGgjtaARuhj3CPiMcKFH8MbGrCRcmj5T26j2o1-jb/pub?gid=1008843646&single=true&output=csv';
        let rules = [];

        async function loadConfig() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0);
                const headers = rows[0].split(',').map(h => h.trim());
                
                for(let i = 1; i < rows.length; i++) {
                    let cols = rows[i].split(',');
                    let ruleObj = {};
                    headers.forEach((header, index) => {
                        ruleObj[header] = parseFloat(cols[index]) || 0;
                    });
                    rules.push(ruleObj);
                }
                
                const btn = document.getElementById('calcBtn');
                btn.disabled = false;
                btn.className = "w-full btn-gold font-bold text-lg py-4 rounded-xl shadow-md hover:opacity-90 active:scale-95 transition transform mt-2";
                btn.innerText = "TÍNH TOÁN NGAY";

                const badge = document.getElementById('statusBadge');
                badge.innerText = "Đã cập nhật luật mới";
                badge.className = "absolute top-2 right-2 bg-green-400 text-white text-[10px] font-bold px-2 py-1 rounded-full";

            } catch (error) {
                document.getElementById('statusBadge').innerText = "Lỗi kết nối mạng!";
                document.getElementById('statusBadge').className = "absolute top-2 right-2 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-full";
            }
        }

        loadConfig();

        function formatCurrency(input) {
            let value = input.value.replace(/\D/g, '');
            if(value !== '') {
                input.value = parseInt(value).toLocaleString('en-US');
            }
        }

        function formatVND(number) {
            return number.toLocaleString('en-US') + ' đ';
        }

        function calculatePromo() {
            let rawTotal = document.getElementById('totalBill').value.replace(/\D/g, '');
            let totalBill = parseInt(rawTotal) || 0;
            
            let rawProduct = document.getElementById('productValue').value.replace(/\D/g, '');
            let productValue = parseInt(rawProduct) || 0;
            
            let promoType = document.getElementById('promoType').value;

            if (totalBill < 10000000) {
                alert('Khuyến mãi chỉ áp dụng cho tổng hóa đơn từ 10.000.000đ trở lên.');
                return;
            }

            let activeRule = rules.find(r => totalBill >= r.Moc_Tu && totalBill <= r.Moc_Den);
            if (!activeRule) {
                activeRule = rules[rules.length - 1]; 
            }

            let giamNgay = activeRule.Giam_Ngay;
            let giamThem = 0;
            
            // Xử lý nhánh Giảm Thêm theo cấu trúc mới
            if (productValue >= 10000000) {
                if (promoType === 'ECZ_ALL') {
                    giamThem = productValue * 0.04;
                    if (giamThem > 3000000) giamThem = 3000000;
                } 
                else if (promoType === 'KC_NEW') {
                    giamThem = productValue * 0.02;
                    if (giamThem > 8000000) giamThem = 8000000;
                }
                else if (promoType === 'KC_VIP12') {
                    giamThem = productValue * 0.03;
                    if (giamThem > 10000000) giamThem = 10000000;
                }
                else if (promoType === 'KC_VIP3') {
                    if (productValue >= 500000000) {
                        giamThem = 31500000; 
                    } else {
                        giamThem = productValue * 0.04;
                        if (giamThem > 15000000) giamThem = 15000000;
                    }
                }
            }

            let tongSauGiam = totalBill - giamNgay - giamThem;

            document.getElementById('resGiamNgay').innerText = formatVND(giamNgay);
            document.getElementById('resGiamThem').innerText = formatVND(giamThem);
            document.getElementById('resTongSauGiam').innerText = formatVND(tongSauGiam);
            
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('resultBox').classList.add('animate-fade-in-up');
        }
    </script>
</body>
</html>
