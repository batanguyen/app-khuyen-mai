<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Máy Tính KM PNJ - Ver 3.6 (Fix Parser)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-pnj { background-color: #003366; }
        .text-pnj { color: #003366; }
        .btn-gold { background-color: #FBB117; color: #003366; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center pt-4 px-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden mb-6">
        <div class="bg-pnj text-white text-center py-5 relative">
            <h1 class="text-xl font-bold uppercase tracking-wide">Máy Tính Khuyến Mãi</h1>
            <p class="text-sm opacity-90 mt-1">Cấu hình linh hoạt từ Sheets</p>
            <div id="statusBadge" class="absolute top-2 right-2 bg-yellow-400 text-pnj text-[10px] font-bold px-2 py-1 rounded-full animate-pulse">Đang tải...</div>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">1. TỔNG GIÁ TRỊ HÓA ĐƠN (VNĐ)</label>
                <input type="text" id="totalBill" placeholder="Nhập tổng bill..." class="w-full px-4 py-3 text-2xl font-bold text-pnj border-2 border-gray-300 rounded-xl focus:border-blue-500 outline-none transition text-center" onkeyup="formatCurrency(this)">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">2. KHÁCH HÀNG & NHÓM HÀNG ƯU ĐÃI</label>
                <select id="promoType" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-800 font-medium rounded-xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                    <option value="NONE">Đang tải danh mục...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">3. GIÁ TRỊ MÓN HÀNG ƯU ĐÃI (VNĐ)</label>
                <input type="text" id="productValue" placeholder="Nhập giá trị món..." class="w-full px-4 py-3 text-lg font-bold border border-gray-300 rounded-xl focus:border-blue-500 outline-none transition text-center" onkeyup="formatCurrency(this)">
            </div>

            <button id="calcBtn" onclick="calculatePromo()" disabled class="w-full bg-gray-300 text-gray-500 font-bold text-lg py-4 rounded-xl shadow-md transition transform mt-2">ĐANG ĐỒNG BỘ...</button>
        </div>

        <div id="resultBox" class="hidden bg-blue-50 p-6 border-t-2 border-blue-200">
            <div class="space-y-3 text-sm">
                <div class="flex justify-between items-center"><span class="text-gray-600 font-medium">Giảm ngay:</span><span id="resGiamNgay" class="font-bold text-red-600 text-lg">0đ</span></div>
                <div class="flex justify-between items-center"><span class="text-gray-600 font-medium">Giảm thêm (% Sản phẩm):</span><span id="resGiamThem" class="font-bold text-red-600 text-lg">0đ</span></div>
                <div id="rowPQT" class="hidden flex justify-between items-center bg-yellow-100 p-2 rounded-lg border border-yellow-200">
                    <span class="text-yellow-800 font-bold italic">QUÀ TẶNG VOUCHER:</span><span id="resPQT" class="font-bold text-yellow-900 text-lg underline">0đ</span>
                </div>
                <div class="h-px bg-gray-300 my-3"></div>
                <div class="flex justify-between items-center text-xl"><span class="font-bold text-gray-800">KHÁCH THANH TOÁN:</span><span id="resTongSauGiam" class="font-extrabold text-pnj text-2xl">0đ</span></div>
            </div>
        </div>
    </div>

    <script>
        // -----------------------------------------------------
        // LINK CSV
        // -----------------------------------------------------
        const rulesUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFpA8jFp8OI8Ggo_mNa2Unjicbb7pP0OFa0pUXGgjtaARuhj3CPiMcKFH8MbGrCRcmj5T26j2o1-jb/pub?gid=1008843646&single=true&output=csv'; 
        const optionsUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFpA8jFp8OI8Ggo_mNa2Unjicbb7pP0OFa0pUXGgjtaARuhj3CPiMcKFH8MbGrCRcmj5T26j2o1-jb/pub?gid=1142757684&single=true&output=csv'; 

        let rules = [];
        let categories = [];

        async function fetchData() {
            try {
                const resRules = await fetch(rulesUrl);
                const textRules = await resRules.text();
                rules = parseCSV(textRules);

                const resOpts = await fetch(optionsUrl);
                const textOpts = await resOpts.text();
                categories = parseCSV(textOpts);

                renderOptions();
                
                document.getElementById('calcBtn').disabled = false;
                document.getElementById('calcBtn').innerText = "TÍNH TOÁN NGAY";
                document.getElementById('calcBtn').className = "w-full btn-gold font-bold text-lg py-4 rounded-xl shadow-md active:scale-95 transition transform";
                document.getElementById('statusBadge').innerText = "Sẵn sàng";
                document.getElementById('statusBadge').className = "absolute top-2 right-2 bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded-full animate-none";
            } catch (e) {
                console.error(e);
                document.getElementById('statusBadge').innerText = "Lỗi tải dữ liệu!";
            }
        }

        // HÀM PARSER MỚI: Tách cột thông minh, bỏ qua dấu phẩy trong ngoặc kép
        function parseCSV(text) {
            const rows = text.split('\n').filter(r => r.trim().length > 0);
            
            const splitRow = (str) => {
                // Regex tìm dấu phẩy không nằm trong ngoặc kép
                return str.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/^"|"$/g, '').trim());
            };

            const headers = splitRow(rows[0]);
            
            return rows.slice(1).map(row => {
                let cols = splitRow(row);
                let obj = {};
                headers.forEach((h, i) => {
                    let val = cols[i];
                    // Nếu là số thì ép kiểu, nếu là text thì giữ nguyên
                    obj[h] = (val !== undefined && val !== "" && !isNaN(val)) ? parseFloat(val) : val;
                });
                return obj;
            });
        }

        function renderOptions() {
            const select = document.getElementById('promoType');
            select.innerHTML = '<option value="NONE">Không mua SP ưu đãi giảm thêm</option>';
            categories.forEach(cat => {
                // Đảm bảo không render các dòng trống
                if(cat.ID && cat.Ten_Hien_Thi) {
                    let opt = document.createElement('option');
                    opt.value = cat.ID;
                    opt.innerText = cat.Ten_Hien_Thi;
                    select.appendChild(opt);
                }
            });
        }

        fetchData();

        function formatCurrency(input) {
            let v = input.value.replace(/\D/g, '');
            if(v !== '') input.value = parseInt(v).toLocaleString('en-US');
        }

        function calculatePromo() {
            let bill = parseInt(document.getElementById('totalBill').value.replace(/\D/g, '')) || 0;
            let prod = parseInt(document.getElementById('productValue').value.replace(/\D/g, '')) || 0;
            let type = document.getElementById('promoType').value;

            if (bill < 10000000) { alert('Hóa đơn chưa đạt mốc 10 triệu ạ!'); return; }

            let rule = rules.find(r => bill >= r.Moc_Tu && bill <= r.Moc_Den);
            if (!rule) rule = rules[rules.length - 1]; // Lấy mốc cao nhất nếu vượt khung

            let giamNgay = rule.Giam_Ngay || 0;
            let pqt = rule.Gia_Tri_PQT || 0;
            let giamThem = 0;

            if (prod >= 10000000 && type !== 'NONE') {
                let tyLe = rule[`TyLe_${type}`] || 0;
                let max = rule[`Max_${type}`] || 0;
                
                if (type === 'KC_VIP3' && prod >= 500000000 && rule.Fix_KC_VIP3_500M) {
                    giamThem = rule.Fix_KC_VIP3_500M;
                } else {
                    giamThem = Math.min(prod * tyLe, max);
                }
            }

            document.getElementById('resGiamNgay').innerText = giamNgay.toLocaleString('en-US') + ' đ';
            document.getElementById('resGiamThem').innerText = giamThem.toLocaleString('en-US') + ' đ';
            
            const rowPQT = document.getElementById('rowPQT');
            if (pqt > 0) {
                document.getElementById('resPQT').innerText = pqt.toLocaleString('en-US') + ' đ';
                rowPQT.classList.remove('hidden');
            } else {
                rowPQT.classList.add('hidden');
            }

            document.getElementById('resTongSauGiam').innerText = (bill - giamNgay - giamThem).toLocaleString('en-US') + ' đ';
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
