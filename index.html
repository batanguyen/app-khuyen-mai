<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Tính KM PNJ MTY - Ver 3.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-pnj { background-color: #003366; }
        .text-pnj { color: #003366; }
        .btn-gold { background-color: #FBB117; color: #003366; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center pt-4 px-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden mb-6">
        <div class="bg-pnj text-white text-center py-5 relative">
            <h1 class="text-xl font-bold uppercase tracking-wide">Ứng Dụng Tính Khuyến Mãi</h1>
            <p id="promoName" class="text-sm opacity-90 mt-1 italic">Đang đồng bộ tên chương trình...</p>
            <div id="statusBadge" class="absolute top-2 right-2 bg-yellow-400 text-pnj text-[10px] font-bold px-2 py-1 rounded-full animate-pulse">Đang tải...</div>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">1. TỔNG GIÁ TRỊ HÓA ĐƠN (VNĐ)</label>
                <input type="text" id="totalBill" placeholder="Nhập giá trị hoá đơn..." class="w-full px-4 py-3 text-2xl font-bold text-pnj border-2 border-gray-300 rounded-xl focus:border-blue-500 outline-none transition text-center" onkeyup="formatCurrency(this)">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">2. KHÁCH HÀNG & NHÓM HÀNG ƯU ĐÃI</label>
                <select id="promoType" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-800 font-medium rounded-xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                    <option value="NONE">Đang tải danh mục...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">3. GIÁ TRỊ MÓN HÀNG ƯU ĐÃI (VNĐ)</label>
                <input type="text" id="productValue" placeholder="Nhập giá trị món..." class="w-full px-4 py-3 text-lg font-bold border border-gray-300 rounded-xl focus:border-blue-500 outline-none transition text-center" onkeyup="formatCurrency(this)">
            </div>

            <button id="calcBtn" onclick="calculatePromo()" disabled class="w-full bg-gray-30
